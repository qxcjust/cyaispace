<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- 渐变叠加层 -->
    <linearGradient id="overlayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.85" />
    </linearGradient>
    
    <!-- 图片滤镜：模糊+降低饱和度 -->
    <filter id="desensitize" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix type="saturate" values="0.6" in="blur" result="desaturated"/>
      <feComponentTransfer in="desaturated">
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
    </filter>
  </defs>
  
  <!-- 原始图片 -->
  <image href="robot-bg-original.png" width="1200" height="800" preserveAspectRatio="xMidYMid slice" filter="url(#desensitize)"/>
  
  <!-- 渐变遮罩层 -->
  <rect width="1200" height="800" fill="url(#overlayGrad)" opacity="0.7"/>
  
  <!-- 科技网格线 -->
  <g opacity="0.08" stroke="white" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="800" x2="1200" y2="800"/>
    <line x1="0" y1="0" x2="0" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
    <line x1="1200" y1="0" x2="1200" y2="800"/>
  </g>
  
  <!-- 电路装饰线 -->
  <g opacity="0.12" stroke="white" stroke-width="2" fill="none">
    <path d="M 100,100 L 200,100 L 250,150 L 400,150"/>
    <path d="M 800,650 L 900,650 L 950,700 L 1100,700"/>
    <path d="M 150,600 L 150,700 L 200,750"/>
    <path d="M 1000,100 L 1000,200 L 950,250"/>
  </g>
  
  <!-- 发光点装饰 -->
  <g fill="rgba(255,255,255,0.4)">
    <circle cx="100" cy="100" r="5"/>
    <circle cx="250" cy="150" r="5"/>
    <circle cx="400" cy="150" r="5"/>
    <circle cx="800" cy="650" r="5"/>
    <circle cx="950" cy="700" r="5"/>
    <circle cx="1100" cy="700" r="5"/>
    <circle cx="150" cy="600" r="5"/>
    <circle cx="200" cy="750" r="5"/>
    <circle cx="1000" cy="100" r="5"/>
    <circle cx="950" cy="250" r="5"/>
  </g>
</svg>
