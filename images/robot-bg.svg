<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  
  <!-- Robot Silhouette -->
  <g transform="translate(600, 400) scale(0.8)" opacity="0.12">
    <!-- Head -->
    <ellipse cx="0" cy="-180" rx="80" ry="90" fill="url(#robotGrad)"/>
    <!-- Eyes -->
    <circle cx="-30" cy="-190" r="15" fill="rgba(255,255,255,0.3)"/>
    <circle cx="30" cy="-190" r="15" fill="rgba(255,255,255,0.3)"/>
    <!-- Neck -->
    <rect x="-25" y="-95" width="50" height="30" fill="url(#robotGrad)"/>
    <!-- Body -->
    <rect x="-100" y="-65" width="200" height="220" rx="20" fill="url(#robotGrad)"/>
    <!-- Chest Panel -->
    <rect x="-60" y="-30" width="120" height="80" rx="10" fill="rgba(255,255,255,0.2)"/>
    <!-- Left Arm -->
    <path d="M -100,-40 L -150,50 L -160,150" stroke="rgba(255,255,255,0.2)" stroke-width="40" stroke-linecap="round" fill="none"/>
    <!-- Right Arm -->
    <path d="M 100,-40 L 150,50 L 160,150" stroke="rgba(255,255,255,0.2)" stroke-width="40" stroke-linecap="round" fill="none"/>
    <!-- Left Leg -->
    <rect x="-70" y="155" width="45" height="180" rx="15" fill="url(#robotGrad)"/>
    <!-- Right Leg -->
    <rect x="25" y="155" width="45" height="180" rx="15" fill="url(#robotGrad)"/>
  </g>
  
  <!-- Tech Grid Lines -->
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="800" x2="1200" y2="800"/>
    <line x1="0" y1="0" x2="0" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
    <line x1="1200" y1="0" x2="1200" y2="800"/>
  </g>
  
  <!-- Circuit Lines -->
  <g opacity="0.08" stroke="white" stroke-width="2" fill="none">
    <path d="M 100,100 L 200,100 L 250,150 L 400,150"/>
    <path d="M 800,650 L 900,650 L 950,700 L 1100,700"/>
    <path d="M 150,600 L 150,700 L 200,750"/>
    <path d="M 1000,100 L 1000,200 L 950,250"/>
  </g>
  
  <!-- Glowing Dots -->
  <g fill="rgba(255,255,255,0.3)">
    <circle cx="100" cy="100" r="4"/>
    <circle cx="250" cy="150" r="4"/>
    <circle cx="400" cy="150" r="4"/>
    <circle cx="800" cy="650" r="4"/>
    <circle cx="950" cy="700" r="4"/>
    <circle cx="1100" cy="700" r="4"/>
    <circle cx="150" cy="600" r="4"/>
    <circle cx="200" cy="750" r="4"/>
    <circle cx="1000" cy="100" r="4"/>
    <circle cx="950" cy="250" r="4"/>
  </g>
</svg>
